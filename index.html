<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yellow Kitchen</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <header class="header">

        <div class="logo">
            <img src="img/Logo.png" alt="">
        </div>

        <div class="header-menu">
            <div class="log in">
                <img src="img/login.png" alt="">
                <a href="#">Log in</a>
            </div>

          

            <div class="cart">
                <img src="img/Vector.png" alt="">
                <p>0</p>
            </div>

            <div class="burger">
                <img src="img/Button (1).png" alt="">
            </div>

        </div>

    </header>

    <section class="hero">

        <div class="hero-left">

            <h1>
                Салатік <br>
                Бурмалдатік
            </h1>

            <div class="hero-buttons">

                <button>
                    Delivery
                    <span>Order in</span>
                </button>

                <button>
                    Takeout
                    <span>Grab and go</span>
                </button>

            </div>

        </div>

        <div class="hero-right">


            <img src="img/Photo-plate.png" alt="">

        </div>

    </section>


    <section class="features">

        <div class="feature">

            <img src="img/time-eat.png" alt="">

            <div>
                <h3>delivery in all paris</h3>
                <p>in less than 30 minutes</p>
            </div>

        </div>

        <div class="feature">

            <img src="img/kurier.png" alt="">

            <div>
                <h3>Free delivery</h3>
                <p>from 29 euros</p>
            </div>

        </div>

        <div class="feature">

            <img src="img/paris.png" alt="">

            <div>
                <h3>Only fresh</h3>
                <p>and French products</p>
            </div>

        </div>

    </section>
    <section class="restaraunts">
        <div class="restaurants-top">
        
        <div class="restorani">
            <div class="textil">
            <p class="text">Restaraunts</p>
            <button class="showall" type="button">Show all</button>
        </div>
        <div class="zabigalovki">
            <img src="img/burger.png" alt="">
            <img src="img/riceee.png" alt="">
            <img src="img/salaticburmoldatik.png" alt="">
            <img src="img/pomoi.png" alt="">

        </div>
        </div>
       
        </div>

        <div class="nearest">

        <div class="nearest-left">

            <h2>Your nearest restaurants</h2>

            <p>
                Each kitchen works with its own delivery area <br>
                to deliver food to you as soon as possible
            </p>

        </div>

        <div class="nearest-right">

            <input type="text" placeholder="Enter delivery address">

            <button type="submit">send</button>

        </div>

        </div>
    </section>

</body>
</html>
